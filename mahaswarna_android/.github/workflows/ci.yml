name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      # ── FIX: Inject google-services.json for debug builds ─────────────────
      # assembleDebug runs the google-services plugin which requires this file.
      # Without injection, CI fails on every PR with:
      #   "File google-services.json is missing from module root folder."
      # Setup: add GOOGLE_SERVICES_JSON secret in GitHub repo settings.
      - name: Inject google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: Lint
        run: ./gradlew ktlintCheck detekt

      - name: Unit Tests
        run: ./gradlew testDebugUnitTest

      - name: Assemble
        run: ./gradlew assembleDebug
