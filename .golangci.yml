run:
  timeout: 5m
  go: '1.23'

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - bodyclose
    - contextcheck
    - noctx
    - rowserrcheck
    - sqlclosecheck

linters-settings:
  goimports:
    local-prefixes: github.com/mahaswarna

